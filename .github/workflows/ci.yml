name: CI

on:
  push:
  pull_request:

concurrency:
  # push 与 pull_request 的 ref 不同；统一使用源 commit SHA 才能取消同一提交的重复流水线。
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [20.18, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Regression checks
        run: npm run regression

      - name: Build
        run: npm run build

  # Windows 门禁：覆盖 Start.bat 使用面与 better-sqlite3 native 模块；
  # 独立于 docker-smoke 的 needs 链，避免拖慢 Linux 交付冒烟。
  verify-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # 与 Ubuntu matrix 的 LTS 侧对齐；完整 20.18/24 矩阵仍由 verify 承担。
          node-version: 20.18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        # 含 tests/start-script-contract.test.cjs（Start.bat / start 脚本契约）
        run: npm test

      - name: Build
        run: npm run build

  docker-smoke:
    needs: verify
    runs-on: ubuntu-24.04
    env:
      IMAGE_NAME: lumimuse-ci:${{ github.sha }}
      CONTAINER_NAME: lumimuse-ci-${{ github.run_id }}-${{ github.run_attempt }}
      DATA_VOLUME: lumimuse-data-${{ github.run_id }}-${{ github.run_attempt }}
      GENERATED_VOLUME: lumimuse-generated-${{ github.run_id }}-${{ github.run_attempt }}
      AVATARS_VOLUME: lumimuse-avatars-${{ github.run_id }}-${{ github.run_attempt }}
      ATTACHMENTS_VOLUME: lumimuse-attachments-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build Docker image
        run: docker build --build-arg LUMIMUSE_BUILD_SHA="$GITHUB_SHA" --tag "$IMAGE_NAME" .

      - name: Create temporary persistent volumes
        run: |
          docker volume create "$DATA_VOLUME"
          docker volume create "$GENERATED_VOLUME"
          docker volume create "$AVATARS_VOLUME"
          docker volume create "$ATTACHMENTS_VOLUME"

      - name: Start Docker image
        run: |
          docker run --detach \
            --name "$CONTAINER_NAME" \
            --publish 127.0.0.1:3000:3000 \
            --env ACCESS_PASSWORD=ci-smoke-password-7f1c91 \
            --env AUTH_SECRET=ci-smoke-auth-secret-72c4d859 \
            -v "$DATA_VOLUME:/app/data" \
            -v "$GENERATED_VOLUME:/app/public/generated" \
            -v "$AVATARS_VOLUME:/app/public/avatars" \
            -v "$ATTACHMENTS_VOLUME:/app/public/attachments" \
            "$IMAGE_NAME"

      - name: Wait for readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error 'http://127.0.0.1:3000/api/health?ready=1'; then
              exit 0
            fi
            if [ "$(docker inspect --format='{{.State.Running}}' "$CONTAINER_NAME")" != "true" ]; then
              exit 1
            fi
            sleep 2
          done
          exit 1

      - name: Assert container runs as non-root
        run: |
          docker exec "$CONTAINER_NAME" node -e "if (process.getuid() !== 1001) process.exit(1); console.log(process.getuid())"

      - name: Assert exact build SHA
        run: |
          curl --fail --silent --show-error 'http://127.0.0.1:3000/api/health?ready=1' |
            node -e "let data = ''; process.stdin.on('data', chunk => data += chunk).on('end', () => { const parsed = JSON.parse(data); if (parsed.build !== process.env.GITHUB_SHA) { console.error(parsed.build); process.exit(1); } });"

      - name: Print Docker logs on failure
        if: failure()
        run: docker logs "$CONTAINER_NAME" || true

      - name: Clean up Docker smoke resources
        if: always()
        run: |
          docker rm --force "$CONTAINER_NAME" || true
          docker volume rm --force "$DATA_VOLUME" || true
          docker volume rm --force "$GENERATED_VOLUME" || true
          docker volume rm --force "$AVATARS_VOLUME" || true
          docker volume rm --force "$ATTACHMENTS_VOLUME" || true
