services:
  lumimuse:
    build: .
    container_name: lumimuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 访问密码（不设置则无需密码）
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-}
      # 登录 cookie 的 HMAC 签名密钥（不设置则回退用 ACCESS_PASSWORD 派生，属弱兜底；建议设置独立随机值）
      - AUTH_SECRET=${AUTH_SECRET:-}
    volumes:
      # 首次部署时建议保留默认绑定挂载；如果宿主机目录是新建的，入口脚本会自动修复权限
      # 持久化数据库文件
      - ./data:/app/data
      # 持久化生成的图片和上传的头像
      - ./public/generated:/app/public/generated
      - ./public/avatars:/app/public/avatars
      - ./public/attachments:/app/public/attachments
