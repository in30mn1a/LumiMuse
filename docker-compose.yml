services:
  lumimuse:
    build: .
    container_name: lumimuse
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      # 默认读取 README 指引创建的 .env.local；验证或 CI 可通过 LUMIMUSE_ENV_FILE 指向其他占位文件。
      - ${LUMIMUSE_ENV_FILE:-.env.local}
    volumes:
      # 默认使用绑定挂载，便于直接备份宿主机文件。
      # Linux bind mount 首次部署前需确保目录属于 UID/GID 1001；entrypoint 不再自动 chown。
      # 示例：sudo chown -R 1001:1001 data public/generated public/avatars public/attachments
      # 持久化数据库文件
      - ./data:/app/data
      # 持久化生成的图片和上传的头像
      - ./public/generated:/app/public/generated
      - ./public/avatars:/app/public/avatars
      - ./public/attachments:/app/public/attachments
