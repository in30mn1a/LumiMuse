name: lumimuse
description: 温柔暖光 · 角色陪伴 · 长期记忆 — 多平台聊天陪伴工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 数据库
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28

  # 路由
  go_router: ^14.8.1

  # 网络
  dio: ^5.7.0

  # 工具
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.6
  cached_network_image: ^3.4.1
  json_annotation: ^4.9.0

  # UI 组件
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  reorderable_grid_view: ^2.2.8
  image_cropper: ^8.0.2

  # NAI ZIP raw inflate 解压（R1：NovelAI 返回 method=8 deflate 时需 raw inflate）
  archive: ^3.6.1
  # 启动密码 PBKDF2 哈希（R13：可选启动密码使用 Pbkdf2 + Hmac.sha256）
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 集成测试包（任务 7：5 项关键集成场景），提供与 flutter_test 等价的 API，
  # 同时允许在 integration_test/ 目录下用 `flutter test integration_test/` 运行。
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  glados: ^1.1.7
dependency_overrides:
  # glados 依赖 test ^1.20.0，需要与 Flutter SDK 固定的 test_api 0.7.10 兼容
  # test 1.30.0 使用 test_api 0.7.10，但其 analyzer 约束与 riverpod_generator 冲突
  # 通过覆盖 analyzer 版本解决 test 和 riverpod_generator 的间接冲突
  analyzer: ^7.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/

  fonts:
    - family: LXGWWenKaiScreen
      fonts:
        - asset: assets/fonts/LXGWWenKaiScreen-Regular.ttf
